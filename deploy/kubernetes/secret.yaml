# Placeholder secret for Postgres DSN. Replace the value with your actual DSN before applying.
# Example: echo -n 'postgres://user:password@host:5432/db?sslmode=require' | base64
apiVersion: v1
kind: Secret
metadata:
  name: job-app-secret
  namespace: default
  labels:
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Replace with your real Postgres DSN (or use external secret manager).
  POSTGRES_DSN: "postgres://jobs:CHANGE_ME@postgres:5432/jobs?sslmode=disable"
