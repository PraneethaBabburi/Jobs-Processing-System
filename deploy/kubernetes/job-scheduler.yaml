# Job Scheduler (Kafka+Postgres): promotes due scheduled jobs and runs recurring (cron) schedules.
# Depends on: job-app-config ConfigMap, job-app-secret Secret.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-scheduler
  namespace: default
  labels:
    app: job-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-scheduler
  template:
    metadata:
      labels:
        app: job-scheduler
    spec:
      containers:
        - name: scheduler
          image: job-scheduler:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: job-app-config
            - secretRef:
                name: job-app-secret
          ports:
            - containerPort: 9091
              name: http
          livenessProbe:
            httpGet:
              path: /ready
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: job-scheduler
  namespace: default
  labels:
    app: job-scheduler
spec:
  type: ClusterIP
  ports:
    - port: 9091
      targetPort: 9091
      name: http
  selector:
    app: job-scheduler
