# Promtail: ship Docker container logs to Loki.
# On Linux: mount /var/run/docker.sock and /var/lib/docker/containers.
# On Docker Desktop (Windows/Mac): container log path may differ; use Loki Docker log driver if needed.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
      - target_label: 'job'
        replacement: 'docker'
    pipeline_stages:
      - docker: {}
