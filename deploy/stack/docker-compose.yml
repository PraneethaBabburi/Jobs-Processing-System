# Full stack: Kafka (KRaft), Postgres, MailHog, Job API, Worker, Dashboard, Loki, Promtail.
# Usage: docker compose -f deploy/stack/docker-compose.yml up -d
# Then apply Postgres schema and run ./scripts/run-sample-jobs.sh (see README)
#
# Logs: Loki (http://localhost:3100). For Loki Docker log driver, install:
#   docker plugin install grafana/loki-docker-driver:2.9.4 --alias loki --grant-all-permissions

services:
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka-init:
    image: apache/kafka:latest
    entrypoint: []
    command:
      - sh
      - -c
      - |
        sleep 3
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --topic job.requests --partitions 1 --replication-factor 1 || true
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --topic job.events --partitions 1 --replication-factor 1 || true
    depends_on:
      kafka:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
      POSTGRES_DB: jobs
    ports:
      # Use 5433 if 5432 is already in use (e.g. local Postgres or another stack).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs"]
      interval: 2s
      timeout: 3s
      retries: 5
      start_period: 40s

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      # Use 1026/8026 if 1025/8025 are already in use (e.g. another MailHog or stack).
      - "1026:1025"
      - "8026:8025"

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      # Use 16687/4319 if 16686/4318 are already in use.
      - "16687:16686"
      - "4319:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_OTLP_HTTP_HOST_PORT: "0.0.0.0:4318"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:16686 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  job-api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    ports:
      - "8083:8080"
      - "9090:9090"
    environment:
      REST_ADDR: ":8080"
      METRICS_ADDR: ":9090"
      POSTGRES_DSN: "postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: job.events
      KAFKA_JOBS_TOPIC: job.requests
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      DEBUG_LOG_PATH: "/debug/debug-3a3d06.log"
    volumes:
      - ../../:/debug
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3101/loki/api/v1/push"
        loki-batch-size: "400"
        loki-external-labels: "container=job-api,stack=local"

  job-scheduler:
    build:
      context: ../..
      dockerfile: Dockerfile.scheduler
    environment:
      POSTGRES_DSN: "postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_JOBS_TOPIC: job.requests
      SCHEDULER_INTERVAL: "2m"
      SCHEDULER_HTTP_ADDR: ":9091"
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9091/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3101/loki/api/v1/push"
        loki-batch-size: "400"
        loki-external-labels: "container=job-scheduler,stack=local"

  job-worker:
    build:
      context: ../..
      dockerfile: Dockerfile.worker
    environment:
      POSTGRES_DSN: "postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      KAFKA_TOPIC: job.events
      KAFKA_JOBS_TOPIC: job.requests
      KAFKA_CONSUMER_GROUP: job-worker
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      DEBUG_LOG_PATH: "/debug/debug-3a3d06.log"
      SMTP_ADDR: mailhog:1025
      EMAIL_FROM: noreply@localhost
      REPORT_OUTPUT_DIR: /out
      INVOICE_OUTPUT_DIR: /out
      IMAGE_OUTPUT_DIR: /out
    volumes:
      - ../../out:/out
      - ../../:/debug
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      job-api:
        condition: service_started
      jaeger:
        condition: service_healthy
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3101/loki/api/v1/push"
        loki-batch-size: "400"
        loki-external-labels: "container=job-worker,stack=local"

  user-service:
    build:
      context: ../..
      dockerfile: Dockerfile.user-service
    ports:
      - "8081:8081"
    environment:
      JOB_API_URL: http://job-api:8080
      LISTEN_ADDR: ":8081"
    depends_on:
      - job-api

  billing-service:
    build:
      context: ../..
      dockerfile: Dockerfile.billing-service
    ports:
      - "8082:8082"
    environment:
      JOB_API_URL: http://job-api:8080
      LISTEN_ADDR: ":8082"
    depends_on:
      - job-api

  dashboard:
    build:
      context: ../..
      dockerfile: deploy/stack/dashboard/Dockerfile
    ports:
      - "8080:8080"
    environment:
      JOB_API_URL: http://job-api:8080
      LISTEN_ADDR: ":8080"
    depends_on:
      - job-api
    logging:
      driver: loki
      options:
        loki-url: "http://host.docker.internal:3101/loki/api/v1/push"
        loki-batch-size: "400"
        loki-external-labels: "container=dashboard,stack=local"

  loki:
    image: grafana/loki:2.9.4
    ports:
      # Use 3101 if 3100 is already in use (e.g. another Loki or stack).
      - "3101:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.4
    volumes:
      - ./promtail/promtail-config.yaml:/etc/promtail/promtail-config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yaml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki

volumes:
  grafana_data:
