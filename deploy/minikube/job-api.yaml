apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-api
  namespace: default
  labels:
    app: job-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-api
  template:
    metadata:
      labels:
        app: job-api
    spec:
      containers:
        - name: api
          image: job-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 9090
              name: metrics
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: GRPC_ADDR
              value: ":50051"
          livenessProbe:
            grpc:
              port: 50051
              service: grpc.health.v1.Health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 50051
              service: grpc.health.v1.Health
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: job-api
  namespace: default
  labels:
    app: job-api
spec:
  type: ClusterIP
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
  selector:
    app: job-api
