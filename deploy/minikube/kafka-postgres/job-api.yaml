apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-api
  namespace: default
  labels:
    app: job-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-api
  template:
    metadata:
      labels:
        app: job-api
    spec:
      containers:
        - name: api
          image: job-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: REST_ADDR
              value: ":8080"
            - name: METRICS_ADDR
              value: ":9090"
            - name: POSTGRES_DSN
              value: "postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: "job.events"
            - name: KAFKA_JOBS_TOPIC
              value: "job.requests"
          ports:
            - containerPort: 8080
              name: rest
            - containerPort: 9090
              name: metrics
          readinessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: job-api
  namespace: default
  labels:
    app: job-api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: rest
    - port: 9090
      targetPort: 9090
      name: metrics
  selector:
    app: job-api

