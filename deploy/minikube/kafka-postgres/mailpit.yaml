apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: default
  labels:
    app: mailpit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailpit
  template:
    metadata:
      labels:
        app: mailpit
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1025
              name: smtp
            - containerPort: 8025
              name: web
          readinessProbe:
            tcpSocket:
              port: 8025
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: default
  labels:
    app: mailpit
spec:
  type: ClusterIP
  ports:
    - port: 1025
      targetPort: 1025
      name: smtp
    - port: 8025
      targetPort: 8025
      name: web
  selector:
    app: mailpit

