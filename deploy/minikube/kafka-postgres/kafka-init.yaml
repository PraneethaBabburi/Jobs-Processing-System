apiVersion: batch/v1
kind: Job
metadata:
  name: kafka-init
  namespace: default
spec:
  ttlSecondsAfterFinished: 30
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: kafka-init
          image: apache/kafka:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              echo "Waiting for kafka..."
              for i in $(seq 1 60); do
                /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1 && break
                sleep 2
              done
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --topic job.requests --partitions 1 --replication-factor 1 || true
              /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --topic job.events --partitions 1 --replication-factor 1 || true

