apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-scheduler
  namespace: default
  labels:
    app: job-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-scheduler
  template:
    metadata:
      labels:
        app: job-scheduler
    spec:
      containers:
        - name: scheduler
          image: job-scheduler:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DSN
              value: "postgres://jobs:jobs@postgres:5432/jobs?sslmode=disable"
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: KAFKA_JOBS_TOPIC
              value: "job.requests"
            - name: SCHEDULER_INTERVAL
              value: "2m"
            - name: SCHEDULER_HTTP_ADDR
              value: ":9091"
          ports:
            - containerPort: 9091
              name: http
          livenessProbe:
            httpGet:
              path: /health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
---
apiVersion: v1
kind: Service
metadata:
  name: job-scheduler
  namespace: default
  labels:
    app: job-scheduler
spec:
  type: ClusterIP
  ports:
    - port: 9091
      targetPort: 9091
      name: http
  selector:
    app: job-scheduler

