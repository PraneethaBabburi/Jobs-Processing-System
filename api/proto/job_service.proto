syntax = "proto3";

package job.v1;

option go_package = "github.com/PraneethaBabburi/Jobs-Processing-System/api/proto/jobv1;jobv1";

// JobService allows submitting and querying jobs.
service JobService {
  rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
  rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc ListArchivedJobs(ListArchivedJobsRequest) returns (ListArchivedJobsResponse);
  rpc RetryArchivedJob(RetryArchivedJobRequest) returns (RetryArchivedJobResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  // Admin: queue inspection and control
  rpc ListQueues(ListQueuesRequest) returns (ListQueuesResponse);
  rpc PauseQueue(PauseQueueRequest) returns (PauseQueueResponse);
  rpc UnpauseQueue(UnpauseQueueRequest) returns (UnpauseQueueResponse);
}

message SubmitJobRequest {
  string tenant_id = 1;
  string type = 2;      // job type: "email", "hello", etc.
  bytes payload = 3;
  JobOptions options = 4;
}

message JobOptions {
  int32 max_retry = 1;           // max retry attempts (default: 5)
  string queue = 2;              // queue name for priority (default: "default")
  int64 run_at_unix_sec = 3;     // optional: run at time (Unix seconds)
}

message SubmitJobResponse {
  string job_id = 1;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message GetJobStatusResponse {
  string job_id = 1;
  string status = 2;   // "pending", "processing", "completed", "failed", "archived"
  int32 attempt = 3;
  string last_error = 4;
}

message ListArchivedJobsRequest {
  string queue = 1;   // optional; if empty, list from all queues
  int32 limit = 2;    // max items to return (default 100)
}

message ArchivedJobInfo {
  string job_id = 1;
  string queue = 2;
  string type = 3;
  bytes payload = 4;
  int32 attempt = 5;
  string last_error = 6;
}

message ListArchivedJobsResponse {
  repeated ArchivedJobInfo jobs = 1;
}

message RetryArchivedJobRequest {
  string job_id = 1;
  string queue = 2;   // required: queue where the archived task lives
}

message RetryArchivedJobResponse {}

message ListJobsRequest {
  string queue = 1;   // optional filter by queue
  string status = 2;  // optional filter: pending, scheduled, processing, completed, failed, archived
  int32 limit = 3;    // max items (default 100)
  int32 offset = 4;   // pagination offset
}

message JobInfo {
  string job_id = 1;
  string type = 2;
  string queue = 3;
  string status = 4;
  int32 attempt = 5;
  string last_error = 6;
  int64 created_at_unix_sec = 7;
  int64 updated_at_unix_sec = 8;
  int64 completed_at_unix_sec = 9;
}

message ListJobsResponse {
  repeated JobInfo jobs = 1;
}

message CancelJobRequest {
  string job_id = 1;
  string queue = 2;   // optional; if empty, search in default queues
}

message CancelJobResponse {}

message ListQueuesRequest {}

message QueueInfo {
  string name = 1;
  int64 pending = 2;
  int64 active = 3;
  int64 scheduled = 4;
  int64 retry = 5;
  int64 archived = 6;
  bool paused = 7;
}

message ListQueuesResponse {
  repeated QueueInfo queues = 1;
}

message PauseQueueRequest {
  string queue = 1;
}

message PauseQueueResponse {}

message UnpauseQueueRequest {
  string queue = 1;
}

message UnpauseQueueResponse {}
